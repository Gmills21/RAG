# Profile: dev-ollama
# Use case: Local development on founder laptop (offline, no paid API)
# Kotaemon vendor: ChatOpenAI (OpenAI-compatible)

profile: dev-ollama

llm:
  vendor: ChatOpenAI
  api_key_env: OLLAMA_API_KEY   # any non-empty string; Ollama does not validate keys
  api_key_example: ollama
  base_url: http://host.docker.internal:11434/v1/
  model: qwen3:4b
  fallback_model: qwen3:1.7b

embeddings:
  vendor: ChatOpenAI
  api_key_env: OLLAMA_API_KEY
  api_key_example: ollama
  base_url: http://host.docker.internal:11434/v1/
  model: nomic-embed-text

notes:
  - Use host.docker.internal from inside Docker, not localhost.
  - Best-effort latency only; not for prospect demos or paid pilots.
  - Pull models with: ./scripts/setup_ollama.sh
