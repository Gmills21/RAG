# Profile: demo-hosted
# Use case: Prospect demos; cited query SLA target < 30s p95
# Kotaemon vendor: ChatOpenAI

profile: demo-hosted

llm:
  vendor: ChatOpenAI
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1/
  model: gpt-4o-mini
  # Azure OpenAI alternative:
  # api_key_env: AZURE_OPENAI_API_KEY
  # base_url: https://YOUR_RESOURCE.openai.azure.com/openai/deployments/YOUR_DEPLOYMENT
  # model: gpt-4o-mini

embeddings:
  vendor: ChatOpenAI
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1/
  model: text-embedding-3-small

notes:
  - Required before external prospect demos.
  - Pre-index sample-data before live demos; run ./scripts/benchmark_query_sla.sh
  - Re-index if switching from dev-ollama embeddings.
