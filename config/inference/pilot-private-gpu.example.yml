# Profile: pilot-private-gpu
# Use case: Customer forbids cloud LLM; Ollama/vLLM on GPU VPS
# Kotaemon vendor: ChatOpenAI (OpenAI-compatible)

profile: pilot-private-gpu

llm:
  vendor: ChatOpenAI
  api_key_env: OLLAMA_API_KEY
  api_key_example: ollama
  base_url: http://127.0.0.1:11434/v1/
  model: qwen3:8b
  # Replace with customer-sized instruct model available on GPU VPS

embeddings:
  vendor: ChatOpenAI
  api_key_env: OLLAMA_API_KEY
  api_key_example: ollama
  base_url: http://127.0.0.1:11434/v1/
  model: nomic-embed-text

notes:
  - Run Ollama on the VPS GPU, not on founder laptop.
  - Size GPU and model for < 30s cited-query SLA where sold.
  - Re-index after embedding model change.
