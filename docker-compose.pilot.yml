# Pilot deployment override for single-customer VPS
# Usage: docker compose -f docker-compose.yml -f docker-compose.pilot.yml up -d

services:
  # Kotaemon inherits the base local-only 127.0.0.1:7860 binding.
  # Public access is only through Caddy on 80/443.
  # Raw port 7860 is not exposed publicly.
  kotaemon: {}

  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    ports:
      # Only the reverse proxy is exposed publicly
      - "80:80"
      - "443:443"
    volumes:
      # Caddy configuration
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Caddy data for automatic HTTPS certificates
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Public hostname from environment
      - PUBLIC_HOST=${PUBLIC_HOST:-example.com}
      # Required basic auth credentials for first pilots
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-}
      - BASIC_AUTH_HASH=${BASIC_AUTH_HASH:-}
    restart: unless-stopped
    depends_on:
      - kotaemon

volumes:
  caddy_data:
  caddy_config:

# Notes:
# - This configuration is for DEDICATED SINGLE-CUSTOMER VPS ONLY
# - NOT for local testing - use docker-compose.yml alone for local work
# - Copy .env.pilot.example to .env and configure PUBLIC_HOST plus BASIC_AUTH_*
# - Generate basic auth hash with: caddy hash-password
# - Kotaemon port 7860 is NOT exposed - access only through Caddy HTTPS
# - Default paid-pilot inference is pilot-hosted, configured inside Kotaemon
# - Use one VPS per customer for first pilots
# - Keep customer data in customer-specific folders
